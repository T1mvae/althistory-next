name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily rebuild so Notion edits reach the live site

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Restore translation + media cache
        uses: actions/cache@v4
        with:
          path: |
            translations.cache.json
            public/notion-media
          key: site-cache-${{ github.run_id }}
          restore-keys: |
            site-cache-
      - name: Build static site
        env:
          BUILD_TARGET: export
          TRANSLATE_PROVIDER: deepl
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_UNIVERSES_DB_ID: 84eb913e738e41b5a36de1bb52146dff
          NEXT_PUBLIC_SITE_URL: https://t1mvae.github.io/althistory-next
        run: |
          npm run build
          touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
